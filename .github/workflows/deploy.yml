name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validate data
        run: npm run validate:data

      - name: Build
        run: npm run build
        env:
          VITE_GISCUS_REPO: ${{ vars.VITE_GISCUS_REPO }}
          VITE_GISCUS_REPO_ID: ${{ vars.VITE_GISCUS_REPO_ID }}
          VITE_GISCUS_BUG_CATEGORY: ${{ vars.VITE_GISCUS_BUG_CATEGORY }}
          VITE_GISCUS_BUG_CATEGORY_ID: ${{ vars.VITE_GISCUS_BUG_CATEGORY_ID }}
          VITE_GISCUS_REQUEST_CATEGORY: ${{ vars.VITE_GISCUS_REQUEST_CATEGORY }}
          VITE_GISCUS_REQUEST_CATEGORY_ID: ${{ vars.VITE_GISCUS_REQUEST_CATEGORY_ID }}
          VITE_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.VITE_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
